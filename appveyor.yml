version: "{build}"

# Déclencher uniquement sur les tags vX.X.X
branches:
  only:
    - main

skip_non_tags: true

image: Visual Studio 2022

environment:
  GITHUB_TOKEN:
    secure: REMPLACER_PAR_TOKEN_CHIFFRE

cache:
  - node_modules -> package-lock.json
  - '%USERPROFILE%\.cargo\registry'

install:
  - ps: Install-Product node 22
  - cmd: rustup toolchain install stable-msvc --no-self-update
  - cmd: rustup default stable-msvc
  - cmd: npm ci

build_script:
  - cmd: npx tauri build --bundles nsis,msi

after_build:
  - cmd: copy src-tauri\target\release\app.exe Praxie-portable-%APPVEYOR_REPO_TAG_NAME%.exe

artifacts:
  - path: Praxie-portable-*.exe
    name: portable
  - path: src-tauri\target\release\bundle\nsis\*.exe
    name: nsis-installer
  - path: src-tauri\target\release\bundle\msi\*.msi
    name: msi-installer

deploy:
  provider: GitHub
  auth_token:
    secure: REMPLACER_PAR_TOKEN_CHIFFRE
  artifact: portable, nsis-installer, msi-installer
  force_update: true
  on:
    APPVEYOR_REPO_TAG: true
